<svg width="100%" viewBox="0 0 900 1200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Next layer: Risk &amp; Trade-off, alongside Decide</title>
<desc>A Risk and Trade-off Record branches off Decide, drafted by Author and reviewed by the product manager. Irreversible or wide blast-radius trade-offs circulate to a small circle before being locked in, then feed back into Capture. Every record is filed in Store, and its revisit trigger feeds Learn, sharpening the next record Author drafts.</desc>

<rect x="0" y="0" width="900" height="1200" fill="#FFFFFF"/>

<text x="450" y="24" text-anchor="middle" style="font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:15px;font-weight:600;fill:#111111">Next layer: risk &amp; trade-off, alongside Decide</text>

<rect x="20" y="36" width="12" height="12" rx="3" fill="#0d76eb"/>
<text x="37" y="46" style="font-family:'Anthropic Sans', sans-serif;font-size:11px;fill:#333333">risk &amp; trade-off step</text>
<rect x="220" y="36" width="12" height="12" rx="3" fill="#111111"/>
<text x="237" y="46" style="font-family:'Anthropic Sans', sans-serif;font-size:11px;fill:#333333">human checkpoint / hub</text>
<rect x="430" y="36" width="12" height="12" rx="3" fill="#84c65a"/>
<text x="447" y="46" style="font-family:'Anthropic Sans', sans-serif;font-size:11px;fill:#333333">knowledge-loop touchpoint</text>
<line x1="650" y1="42" x2="672" y2="42" stroke="#0d76eb" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="678" y="46" style="font-family:'Anthropic Sans', sans-serif;font-size:11px;fill:#333333">conditional path</text>

<defs>
<marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0d76eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowBlack" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#111111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5fa834" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Decide -->
<rect x="330" y="76" width="240" height="44" rx="8" fill="#EAF3FD" stroke="#0d76eb" stroke-width="1"/>
<text x="450" y="94" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:13px;font-weight:500;fill:#111111">Decide</text>
<text x="450" y="111" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;fill:#4d4d4d">the call already made</text>

<line x1="450" y1="120" x2="450" y2="138" stroke="#0d76eb" stroke-width="1" marker-end="url(#arrowPurple)"/>

<!-- Author drafts -->
<rect x="280" y="138" width="340" height="54" rx="8" fill="#F1FAEA" stroke="#84c65a" stroke-width="1"/>
<text x="450" y="160" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:13px;font-weight:500;fill:#111111">Author drafts the record</text>
<text x="450" y="178" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;fill:#4d4d4d">pulled from Store: dependencies · past decisions · evidence strength</text>

<line x1="450" y1="192" x2="450" y2="210" stroke="#84c65a" stroke-width="1" marker-end="url(#arrowGreen)"/>

<!-- Record card -->
<rect x="210" y="210" width="480" height="386" rx="10" fill="#FFFFFF" stroke="#111111" stroke-width="1.2"/>
<text x="450" y="234" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:14px;font-weight:600;fill:#111111">Risk &amp; Trade-off Record</text>
<line x1="226" y1="246" x2="674" y2="246" stroke="#D9D9D9" stroke-width="1"/>

<g style="font-family:'Anthropic Sans', sans-serif">
<text x="234" y="266" style="font-size:11px;font-weight:700;fill:#111111">Risk</text>
<text x="234" y="282" style="font-size:10px;font-style:italic;fill:#4d4d4d">named plainly, not buried in caveats</text>
<line x1="226" y1="296" x2="674" y2="296" stroke="#D9D9D9" stroke-width="1"/>

<text x="234" y="316" style="font-size:11px;font-weight:700;fill:#111111">Reversibility</text>
<text x="234" y="332" style="font-size:10px;font-style:italic;fill:#4d4d4d">one-way door, or two-way door</text>
<line x1="226" y1="346" x2="674" y2="346" stroke="#D9D9D9" stroke-width="1"/>

<text x="234" y="366" style="font-size:11px;font-weight:700;fill:#111111">Blast radius</text>
<text x="234" y="382" style="font-size:10px;font-style:italic;fill:#4d4d4d">who or what breaks if it's wrong</text>
<line x1="226" y1="396" x2="674" y2="396" stroke="#D9D9D9" stroke-width="1"/>

<text x="234" y="416" style="font-size:11px;font-weight:700;fill:#111111">The call</text>
<text x="234" y="432" style="font-size:10px;font-style:italic;fill:#4d4d4d">accept · mitigate · avoid · transfer</text>
<line x1="226" y1="446" x2="674" y2="446" stroke="#D9D9D9" stroke-width="1"/>

<text x="234" y="466" style="font-size:11px;font-weight:700;fill:#111111">Reasoning</text>
<text x="234" y="482" style="font-size:10px;font-style:italic;fill:#4d4d4d">in the product manager's own words</text>
<line x1="226" y1="496" x2="674" y2="496" stroke="#D9D9D9" stroke-width="1"/>

<text x="234" y="516" style="font-size:11px;font-weight:700;fill:#111111">Owner</text>
<text x="234" y="532" style="font-size:10px;font-style:italic;fill:#4d4d4d">who's accountable if it lands</text>
<line x1="226" y1="546" x2="674" y2="546" stroke="#D9D9D9" stroke-width="1"/>

<text x="234" y="566" style="font-size:11px;font-weight:700;fill:#111111">Revisit trigger</text>
<text x="234" y="582" style="font-size:10px;font-style:italic;fill:#4d4d4d">a date or condition that forces a second look</text>
</g>

<line x1="450" y1="596" x2="450" y2="614" stroke="#111111" stroke-width="1" marker-end="url(#arrowBlack)"/>

<!-- Review -->
<rect x="310" y="614" width="280" height="50" rx="8" fill="#111111"/>
<text x="450" y="634" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:13px;font-weight:500;fill:#FFFFFF">Review (product manager)</text>
<text x="450" y="651" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:11px;fill:#cfd2d6">reads, edits, decides · owns it</text>

<!-- straight continuation to Store -->
<line x1="450" y1="664" x2="450" y2="690" stroke="#111111" stroke-width="1" marker-end="url(#arrowBlack)"/>

<!-- diagonal conditional branch, left -->
<line x1="360" y1="664" x2="150" y2="690" stroke="#0d76eb" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrowPurple)"/>

<!-- Conditional box -->
<rect x="10" y="690" width="280" height="52" rx="8" fill="#FFFFFF" stroke="#0d76eb" stroke-width="1.2" stroke-dasharray="4 3"/>
<text x="150" y="710" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:11px;font-style:italic;fill:#111111">if irreversible or high blast radius</text>
<text x="150" y="727" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:9px;fill:#4d4d4d">goes out before it's locked in</text>

<line x1="150" y1="742" x2="150" y2="760" stroke="#0d76eb" stroke-width="1" marker-end="url(#arrowPurple)"/>

<!-- Circulate -->
<rect x="10" y="760" width="280" height="50" rx="8" fill="#EAF3FD" stroke="#0d76eb" stroke-width="1"/>
<text x="150" y="780" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:12px;font-weight:500;fill:#111111">Circulates to the small circle</text>
<text x="150" y="797" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;fill:#4d4d4d">same mechanism as the decision memo</text>

<line x1="150" y1="810" x2="150" y2="828" stroke="#0d76eb" stroke-width="1" marker-end="url(#arrowPurple)"/>

<!-- small circle -->
<circle cx="150" cy="892" r="68" fill="#EAF3FD" stroke="#0d76eb" stroke-width="1.2" stroke-dasharray="4 3"/>
<text x="150" y="884" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:11px;font-weight:700;fill:#111111">small circle</text>
<text x="150" y="900" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:9px;fill:#4d4d4d">eng · peers · leadership</text>
<text x="150" y="914" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:8px;font-style:italic;fill:#4d4d4d">tests it, doesn't approve it</text>

<line x1="150" y1="960" x2="150" y2="978" stroke="#5fa834" stroke-width="1" marker-end="url(#arrowGreen)"/>

<!-- back into capture -->
<rect x="10" y="970" width="280" height="50" rx="8" fill="#F1FAEA" stroke="#84c65a" stroke-width="1"/>
<text x="150" y="990" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:12px;font-weight:500;fill:#111111">Back into Capture</text>
<text x="150" y="1007" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;fill:#4d4d4d">sharpens the record before it's final</text>

<!-- diagonal main branch, right, mirrors the left one for visual balance -->
<line x1="540" y1="664" x2="620" y2="664" stroke="none"/>

<!-- Store -->
<rect x="310" y="690" width="280" height="50" rx="8" fill="#111111"/>
<text x="450" y="710" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:13px;font-weight:500;fill:#FFFFFF">Store</text>
<text x="450" y="727" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:11px;fill:#cfd2d6">record filed · linked to its Decide</text>
<text x="450" y="752" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:9px;font-style:italic;fill:#0d76eb">(same 3 rules apply as Ask Store)</text>

<line x1="450" y1="758" x2="450" y2="772" stroke="#0d76eb" stroke-width="1" marker-end="url(#arrowPurple)"/>

<!-- Revisit trigger -->
<rect x="310" y="772" width="280" height="50" rx="8" fill="#EAF3FD" stroke="#0d76eb" stroke-width="1"/>
<text x="450" y="792" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:12px;font-weight:500;fill:#111111">Revisit trigger fires</text>
<text x="450" y="809" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;fill:#4d4d4d">date or condition reached</text>

<line x1="450" y1="822" x2="450" y2="840" stroke="#0d76eb" stroke-width="1" marker-end="url(#arrowPurple)"/>

<!-- Learn -->
<rect x="310" y="840" width="280" height="50" rx="8" fill="#EAF3FD" stroke="#0d76eb" stroke-width="1"/>
<text x="450" y="860" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:13px;font-weight:500;fill:#111111">Learn</text>
<text x="450" y="877" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;fill:#4d4d4d">did the risk happen · did the mitigation hold</text>

<!-- feedback loop curve back to Decide -->
<path d="M590 865 C 850 865, 850 98, 570 98" fill="none" stroke="#0d76eb" stroke-width="1.3" marker-end="url(#arrowPurple)"/>
<text x="866" y="480" text-anchor="middle" transform="rotate(-90 866 480)" style="font-family:'Anthropic Sans', sans-serif;font-size:9.5px;font-style:italic;fill:#0d76eb">sharpens the next record Author drafts</text>

<!-- footer: the debt this closes -->
<rect x="50" y="1060" width="800" height="100" rx="10" fill="#FAFAFA" stroke="#D9D9D9" stroke-width="1"/>
<text x="450" y="1082" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:12px;font-weight:600;fill:#333333">the debt this layer closes</text>

<rect x="88" y="1096" width="170" height="36" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
<text x="173" y="1118" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;fill:#111111">Documentation debt</text>

<rect x="273" y="1096" width="170" height="36" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
<text x="358" y="1118" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;fill:#111111">Strategic debt</text>

<rect x="458" y="1096" width="170" height="36" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
<text x="543" y="1118" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;fill:#111111">Technical debt</text>

<rect x="643" y="1096" width="170" height="36" rx="6" fill="#EAF3FD" stroke="#0d76eb" stroke-width="1.5"/>
<text x="728" y="1118" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:10px;font-weight:600;fill:#111111">Risk debt</text>

<text x="450" y="1150" text-anchor="middle" style="font-family:'Anthropic Sans', sans-serif;font-size:9.5px;font-style:italic;fill:#4d4d4d">the cost of a choice arriving later as a surprise, to someone who never got to weigh in</text>

</svg>
